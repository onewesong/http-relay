name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build Binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          TARGETS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"

          for target in $TARGETS; do
            goos="${target%/*}"
            goarch="${target#*/}"
            ext=""
            if [ "$goos" = "windows" ]; then
              ext=".exe"
            fi

            bin="http-relay${ext}"
            outdir="dist/http-relay_${VERSION}_${goos}_${goarch}"
            mkdir -p "$outdir"

            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
              -o "$outdir/$bin" ./cmd/http-relay

            if [ "$goos" = "windows" ]; then
              (cd dist && zip -r "http-relay_${VERSION}_${goos}_${goarch}.zip" "$(basename "$outdir")")
            else
              tar -C dist -czf "dist/http-relay_${VERSION}_${goos}_${goarch}.tar.gz" "$(basename "$outdir")"
            fi

            rm -rf "$outdir"
          done

      - name: Generate Checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
