project_name: http-relay

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: http-relay
    main: ./cmd/http-relay
    binary: http-relay
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  use: github

release:
  github:
    owner: onewesong
    name: http-relay
